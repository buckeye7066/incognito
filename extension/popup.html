<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { width: 280px; margin: 0; font: 13px system-ui; background: #16131f; color: #eee; }
    header { display: flex; align-items: center; gap: 8px; padding: 12px; border-bottom: 1px solid #2a2640; }
    header b { font-size: 14px; }
    #status { padding: 10px 12px; font-size: 12px; color: #b9b3d6; }
    #matches { padding: 4px 8px 10px; }
    .match { display: flex; justify-content: space-between; gap: 8px; padding: 7px 8px; border-radius: 6px; cursor: pointer; }
    .match:hover { background: #221e33; }
    .match small { color: #8a85ad; }
    .empty { padding: 10px 12px; color: #8a85ad; }
    .pill { font-size: 10px; padding: 1px 6px; border-radius: 999px; background: #2a2640; }
  </style>
</head>
<body>
  <header>
    <span>🛡️</span><b>Incognito Companion</b>
  </header>
  <div id="status">Checking…</div>
  <div id="matches"></div>
  <script src="popup.js"></script>
</body>
</html>
